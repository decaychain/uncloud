services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - RUST_LOG=uncloud_server=info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  playwright:
    build:
      context: ./tests/playwright
      dockerfile: Dockerfile
    depends_on:
      web:
        condition: service_healthy
    environment:
      - BASE_URL=http://web:80
    volumes:
      - ./tests/playwright/test-results:/app/test-results

volumes:
  mongo-data:
