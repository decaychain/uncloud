name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Drives Cargo.toml's workspace version (and therefore every crate
      # that uses `version.workspace = true`, including uncloud-desktop) off
      # the pushed tag. Without this every release would ship as 0.1.0.
      - name: Sync workspace version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Bumping workspace version to $VERSION"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          grep '^version' Cargo.toml | head -1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      # Even though Linux users update through COPR (`dnf upgrade`), we
      # still run the bundler with the signing key set so that
      # `createUpdaterArtifacts: true` in tauri.conf.json doesn't fail.
      # The signed `.tar.gz` + `.sig` artifacts are produced but not
      # referenced from latest.json â€” RPM/DEB are the GH Release escape
      # hatch for users who can't or won't enable the COPR repo.
      - name: Build desktop bundles
        env:
          UNCLOUD_DESKTOP_FALLBACK_KEY: ${{ secrets.UNCLOUD_DESKTOP_FALLBACK_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles deb,rpm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    outputs:
      installer-name: ${{ steps.detect.outputs.installer-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync workspace version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          grep '^version' Cargo.toml | head -1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        shell: bash
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build desktop bundles
        env:
          UNCLOUD_DESKTOP_FALLBACK_KEY: ${{ secrets.UNCLOUD_DESKTOP_FALLBACK_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles nsis

      - name: Stage signed bundle for the manifest job
        id: detect
        shell: bash
        run: |
          INSTALLER=$(ls target/release/bundle/nsis/*.exe | head -1)
          NAME=$(basename "$INSTALLER")
          mkdir -p artifacts/windows
          cp "$INSTALLER" "${INSTALLER}.sig" artifacts/windows/
          echo "installer-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload signed bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed
          path: artifacts/windows/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig

  # Aggregating job: builds latest.json (Tauri updater manifest schema)
  # from each platform's signature file and uploads it to the release.
  # The desktop app's plugins.updater.endpoints points at this asset, so
  # `https://github.com/decaychain/uncloud/releases/latest/download/latest.json`
  # always resolves to the freshest manifest without us having to mutate
  # a long-lived URL.
  publish-manifest:
    needs: build-windows
    runs-on: ubuntu-24.04
    steps:
      - name: Download Windows signed bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-signed
          path: artifacts/windows

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLER_NAME="${{ needs.build-windows.outputs.installer-name }}"
          SIG=$(cat artifacts/windows/*.sig)
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIG" \
            --arg url "https://github.com/decaychain/uncloud/releases/download/v$VERSION/$INSTALLER_NAME" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $signature, url: $url }
              }
            }' > latest.json
          cat latest.json

      - name: Upload manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json

  # Submits an SRPM to COPR. COPR rebuilds the binary RPM in its mock
  # chroot for every configured Fedora version and publishes to
  # https://copr.fedorainfracloud.org/coprs/decaychain/uncloud/. Users
  # then `dnf copr enable decaychain/uncloud && dnf install uncloud` and
  # get auto-updates for free via `dnf upgrade` / `dnf-automatic`.
  publish-fedora:
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build prerequisites
        run: |
          dnf install -y rpm-build rpmdevtools copr-cli git tar

      - name: Sync workspace version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # Build the source tarball that the .spec consumes. Includes the
      # entire repo (the .spec drives `dx build` and `cargo tauri build`
      # itself, so all source must be present). `git archive` would skip
      # the vendored tauri-plugin-native-audio submodule contents, so we
      # use a plain tar instead.
      - name: Create source tarball
        run: |
          rpmdev-setuptree
          mkdir -p "uncloud-${VERSION}"
          # Copy everything except the .git dir into a versioned subdir,
          # then tarball it. Mirrors what COPR would receive from a
          # %{name}-%{version}.tar.gz Source0.
          rsync -a --exclude='.git' --exclude='target' --exclude='node_modules' \
            --exclude='uncloud-${VERSION}' ./ "uncloud-${VERSION}/"
          tar czf "$HOME/rpmbuild/SOURCES/uncloud-${VERSION}.tar.gz" "uncloud-${VERSION}"
          rm -rf "uncloud-${VERSION}"

      - name: Render .spec with version
        run: |
          sed "s/@@VERSION@@/${VERSION}/g" packaging/fedora/uncloud.spec.in \
            > "$HOME/rpmbuild/SPECS/uncloud.spec"

      - name: Build SRPM
        run: |
          rpmbuild -bs "$HOME/rpmbuild/SPECS/uncloud.spec"

      - name: Configure COPR credentials
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s\n' "$COPR_CONFIG" > ~/.config/copr

      - name: Submit to COPR
        run: |
          SRPM=$(ls "$HOME/rpmbuild/SRPMS"/*.src.rpm | head -1)
          # --nowait: kick off the build and exit. COPR's web UI shows
          # progress; we don't want to tie up a GH Actions runner for
          # 20-30 minutes waiting for Rust + node compilation across
          # multiple Fedora chroots.
          copr-cli build --nowait decaychain/uncloud "$SRPM"
