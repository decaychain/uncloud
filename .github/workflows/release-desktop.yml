name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Drives Cargo.toml's workspace version (and therefore every crate
      # that uses `version.workspace = true`, including uncloud-desktop) off
      # the pushed tag. Without this every release would ship as 0.1.0.
      - name: Sync workspace version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Bumping workspace version to $VERSION"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          grep '^version' Cargo.toml | head -1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      # Even though Linux users update through COPR (`dnf upgrade`), we
      # still run the bundler with the signing key set so that
      # `createUpdaterArtifacts: true` in tauri.conf.json doesn't fail.
      # The signed `.tar.gz` + `.sig` artifacts are produced but not
      # referenced from latest.json — RPM/DEB are the GH Release escape
      # hatch for users who can't or won't enable the COPR repo.
      - name: Build desktop bundles
        env:
          UNCLOUD_DESKTOP_FALLBACK_KEY: ${{ secrets.UNCLOUD_DESKTOP_FALLBACK_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles deb,rpm

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync workspace version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" Cargo.toml
          grep '^version' Cargo.toml | head -1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        shell: bash
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build desktop bundles
        env:
          UNCLOUD_DESKTOP_FALLBACK_KEY: ${{ secrets.UNCLOUD_DESKTOP_FALLBACK_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles nsis

      - name: Stage signed bundle for the manifest job
        shell: bash
        run: |
          INSTALLER=$(ls target/release/bundle/nsis/*.exe | head -1)
          mkdir -p "artifacts/windows-${{ matrix.arch }}"
          cp "$INSTALLER" "${INSTALLER}.sig" "artifacts/windows-${{ matrix.arch }}/"

      - name: Upload signed bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed-${{ matrix.arch }}
          path: artifacts/windows-${{ matrix.arch }}/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig

  # Aggregating job: builds latest.json (Tauri updater manifest schema)
  # from each platform's signature file and uploads it to the release.
  # The desktop app's plugins.updater.endpoints points at this asset, so
  # `https://github.com/decaychain/uncloud/releases/latest/download/latest.json`
  # always resolves to the freshest manifest without us having to mutate
  # a long-lived URL.
  publish-manifest:
    needs: build-windows
    runs-on: ubuntu-24.04
    steps:
      - name: Download Windows x64 signed bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-signed-x64
          path: artifacts/x64

      - name: Download Windows arm64 signed bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-signed-arm64
          path: artifacts/arm64

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          X64_INSTALLER=$(ls artifacts/x64/*.exe | head -1)
          X64_NAME=$(basename "$X64_INSTALLER")
          X64_SIG=$(cat artifacts/x64/*.sig)

          ARM64_INSTALLER=$(ls artifacts/arm64/*.exe | head -1)
          ARM64_NAME=$(basename "$ARM64_INSTALLER")
          ARM64_SIG=$(cat artifacts/arm64/*.sig)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg x64_sig "$X64_SIG" \
            --arg x64_url "https://github.com/decaychain/uncloud/releases/download/v$VERSION/$X64_NAME" \
            --arg arm64_sig "$ARM64_SIG" \
            --arg arm64_url "https://github.com/decaychain/uncloud/releases/download/v$VERSION/$ARM64_NAME" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $x64_sig, url: $x64_url },
                "windows-aarch64": { signature: $arm64_sig, url: $arm64_url }
              }
            }' > latest.json
          cat latest.json

      - name: Upload manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json

  # Submits an SRPM to COPR. COPR rebuilds the binary RPM in its mock
  # chroot for every configured Fedora version and publishes to
  # https://copr.fedorainfracloud.org/coprs/decaychain/uncloud/. Users
  # then `dnf copr enable decaychain/uncloud && dnf install uncloud` and
  # get auto-updates for free via `dnf upgrade` / `dnf-automatic`.
  publish-fedora:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm python3-pip
          pip install --user copr-cli

      # Splits the tag into RPM Version + Release components.
      #   v0.1.0-alpha.23 → Version=0.1.0, Release=0.alpha.23%{?dist}
      #   v0.2.0          → Version=0.2.0, Release=1%{?dist}
      #
      # This is the standard Fedora pre-release convention. Avoids the
      # `~` (tilde) separator, which we tried first but which was being
      # tilde-expanded somewhere in the toolchain. Versions still sort
      # correctly: `Release: 0.alpha.23` < `Release: 1`, so a final
      # 0.1.0-1 release will supersede any 0.1.0-0.alpha.* pre-release.
      - name: Set RPM version + release from tag
        run: |
          VERSION_RAW="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION_RAW" == *-* ]]; then
            RPM_VERSION="${VERSION_RAW%%-*}"
            RPM_RELEASE="0.${VERSION_RAW#*-}"
          else
            RPM_VERSION="$VERSION_RAW"
            RPM_RELEASE="1"
          fi
          echo "VERSION_RAW=$VERSION_RAW" >> "$GITHUB_ENV"
          echo "RPM_VERSION=$RPM_VERSION" >> "$GITHUB_ENV"
          echo "RPM_RELEASE=$RPM_RELEASE" >> "$GITHUB_ENV"
          echo "Version=$RPM_VERSION  Release=$RPM_RELEASE"

      - name: Sync workspace Cargo.toml version
        run: |
          sed -i "0,/^version = .*/s//version = \"$VERSION_RAW\"/" Cargo.toml
          grep '^version' Cargo.toml | head -1

      # Stage the source tree under a versioned directory and tarball
      # it. `cp -r` + `rm` on a copy is more predictable than wrestling
      # with `tar --transform` regex and avoids `git ls-files` failing
      # in environments where the workspace's git metadata isn't where
      # git expects it.
      - name: Create source tarball
        run: |
          mkdir -p "$HOME/rpmbuild/SOURCES" "$HOME/rpmbuild/SPECS" "$HOME/rpmbuild/SRPMS"
          STAGE=$(mktemp -d)
          DIRNAME="uncloud-${RPM_VERSION}"
          cp -r "$GITHUB_WORKSPACE" "$STAGE/$DIRNAME"
          # Drop everything that shouldn't ship inside the SRPM.
          rm -rf "$STAGE/$DIRNAME/.git" \
                 "$STAGE/$DIRNAME/target" \
                 "$STAGE/$DIRNAME/node_modules" \
                 "$STAGE/$DIRNAME/vendor/rustic_core"
          tar -C "$STAGE" -czf "$HOME/rpmbuild/SOURCES/$DIRNAME.tar.gz" "$DIRNAME"
          rm -rf "$STAGE"

      - name: Render .spec with version + release
        run: |
          sed -e "s/@@VERSION@@/${RPM_VERSION}/g" \
              -e "s/@@RELEASE@@/${RPM_RELEASE}/g" \
              packaging/fedora/uncloud.spec.in \
              > "$HOME/rpmbuild/SPECS/uncloud.spec"

      - name: Build SRPM
        run: |
          rpmbuild -bs "$HOME/rpmbuild/SPECS/uncloud.spec"

      - name: Configure COPR credentials
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s\n' "$COPR_CONFIG" > ~/.config/copr

      - name: Submit to COPR
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          SRPM=$(ls "$HOME/rpmbuild/SRPMS"/*.src.rpm | head -1)
          # --nowait: kick off the build and exit. COPR's web UI shows
          # progress; we don't want to tie up a GH Actions runner for
          # 20-30 minutes waiting for Rust + node compilation across
          # multiple Fedora chroots.
          copr-cli build --nowait decaychain/uncloud "$SRPM"

  # Mirror the `.deb` artifacts that `build-linux` already uploaded into
  # an APT repository hosted on GitHub Pages, signed with a project GPG
  # key. Ubuntu users add the repo once and then track releases via
  # `apt upgrade` (the COPR analogue for Fedora). One-time setup for the
  # secrets is documented in `docs/Auto-Update.md`.
  publish-apt:
    runs-on: ubuntu-24.04
    needs: build-linux
    # Don't fail the whole release if APT publishing trips — the .deb
    # files are already on the Release page as the escape-hatch download.
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install reprepro + gpg
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Wait for release assets, then download .deb files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/debs
          # `build-linux` uploads via softprops/action-gh-release which
          # is asynchronous; poll briefly until the .debs are listed.
          for attempt in $(seq 1 30); do
            count=$(gh release view "$GITHUB_REF_NAME" \
              --json assets --jq '[.assets[] | select(.name | endswith(".deb"))] | length')
            if [ "$count" -ge 2 ]; then break; fi
            echo "Waiting for .deb assets (attempt $attempt, currently $count)..."
            sleep 10
          done
          gh release download "$GITHUB_REF_NAME" --pattern '*.deb' --dir /tmp/debs
          ls -la /tmp/debs

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          # Capture the long-form fingerprint of the imported secret key
          # for use as reprepro's `SignWith` field.
          KEY_FPR=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^fpr:/ { print $10; exit }')
          if [ -z "$KEY_FPR" ]; then
            echo "Failed to extract GPG fingerprint" >&2
            exit 1
          fi
          echo "KEY_FPR=$KEY_FPR" >> "$GITHUB_ENV"
          gpg --batch --yes --armor --export "$KEY_FPR" > /tmp/pubkey.gpg

      # Reprepro keeps its package index *and* its internal state under
      # the same root, so the published `gh-pages` branch IS that root.
      # We `worktree add` it, render the distributions config with the
      # signing key fingerprint, then run reprepro against the worktree.
      - name: Check out / create gh-pages worktree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p /tmp/aptroot
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            git fetch origin gh-pages
            git worktree add /tmp/aptroot gh-pages
          else
            # First publish: spawn an empty orphan branch.
            git worktree add --detach /tmp/aptroot
            cd /tmp/aptroot
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/aptroot/conf
          sed "s/@@KEY_FINGERPRINT@@/${KEY_FPR}/" \
            packaging/apt/conf/distributions.in \
            > /tmp/aptroot/conf/distributions
          cp /tmp/pubkey.gpg /tmp/aptroot/pubkey.gpg

      - name: Add .deb files to repository
        run: |
          for deb in /tmp/debs/*.deb; do
            reprepro -b /tmp/aptroot includedeb stable "$deb"
          done
          # reprepro's internal `db/` is binary-state we don't want
          # cluttering the index, but it needs to persist across runs to
          # avoid re-adding identical packages — keep it tracked.
          ls -la /tmp/aptroot/

      - name: Commit + push gh-pages
        working-directory: /tmp/aptroot
        run: |
          # The pubkey is small and convenient to colocate with the repo
          # so the install one-liner is `curl pubkey.gpg | gpg --dearmor`.
          touch .nojekyll  # disable Jekyll so paths with underscores serve
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "Publish ${GITHUB_REF_NAME} to APT repository"
          git push origin gh-pages
