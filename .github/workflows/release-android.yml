name: Release Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      BUNDLETOOL_VERSION: 1.18.1
      BUNDLETOOL_SHA256: 675786493983787ffa11550bdb7c0715679a44e1643f3ff980a529e9c822595c
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Parse semver: major.minor.patch[-pre.N]
          BASE="${TAG%%-*}"
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          CODE=$((MAJOR * 1000000 + MINOR * 10000 + PATCH * 100))
          # Pre-release (alpha.N, beta.N, rc.N) → subtract offset
          if [[ "$TAG" == *-* ]]; then
            PRE_NUM=$(echo "$TAG" | grep -oE '[0-9]+$')
            CODE=$((CODE - 100 + ${PRE_NUM:-1}))
          fi
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV
          echo "VERSION_CODE=$CODE" >> $GITHUB_ENV
          echo "Version: $TAG (code: $CODE)"

      - name: Write tauri.properties
        run: |
          cat > crates/uncloud-desktop/gen/android/app/tauri.properties <<EOF
          tauri.android.versionName=${{ env.VERSION_NAME }}
          tauri.android.versionCode=${{ env.VERSION_CODE }}
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/uncloud-release.jks

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build Android release
        env:
          KEYSTORE_PATH: /tmp/uncloud-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: uncloud
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          UNCLOUD_DESKTOP_FALLBACK_KEY: ${{ secrets.UNCLOUD_DESKTOP_FALLBACK_KEY }}
        run: |
          cd crates/uncloud-desktop
          cargo tauri android build

      - name: Verify 16 KB page alignment
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          BUNDLETOOL_JAR: /tmp/bundletool.jar
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" \
            --output "$BUNDLETOOL_JAR"
          echo "${BUNDLETOOL_SHA256}  ${BUNDLETOOL_JAR}" | sha256sum --check --strict
          bash scripts/check-android-page-alignment.sh \
            crates/uncloud-desktop/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk \
            crates/uncloud-desktop/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: de.lunarstream.uncloud
          releaseFiles: crates/uncloud-desktop/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          tracks: internal
          status: draft

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crates/uncloud-desktop/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          generate_release_notes: true
