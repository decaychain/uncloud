name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check server
        run: cargo check -p uncloud-server

      - name: Build Docker image
        run: docker build -f Dockerfile.server -t uncloud-server-ci .

      - name: Extract static binary
        run: |
          docker create --name extract uncloud-server-ci
          docker cp extract:/uncloud-server uncloud-server-linux-amd64
          docker rm extract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-amd64
          path: uncloud-server-linux-amd64

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build Android debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          cd crates/uncloud-desktop
          cargo tauri android build --debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: crates/uncloud-desktop/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk

  desktop-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build desktop bundles
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dioxus CLI and Tauri CLI
        run: cargo install dioxus-cli tauri-cli --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: cd crates/uncloud-web && npm ci

      - name: Build web frontend
        run: cd crates/uncloud-web && dx build --release

      - name: Copy frontend to src-frontend
        shell: bash
        run: |
          rm -rf crates/uncloud-desktop/src-frontend/assets/
          cp -r target/dx/uncloud-web/release/web/public/* crates/uncloud-desktop/src-frontend/

      - name: Build desktop bundles
        run: |
          cd crates/uncloud-desktop
          cargo tauri build --bundles msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: target/release/bundle/msi/*.msi
