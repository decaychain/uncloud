<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uncloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f5; color: #1a1a1a; display: flex; flex-direction: column; height: 100vh; }

    .tabs { display: flex; border-bottom: 1px solid #ddd; background: #fff; flex-shrink: 0; }
    .tab { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 14px; color: #666; border-bottom: 2px solid transparent; }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

    #content { flex: 1; overflow-y: auto; }
    .panel { display: none; padding: 24px; }
    .panel.active { display: block; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #2563eb; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: #dc2626; color: #fff; }

    .status-bar { padding: 10px 24px; font-size: 13px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-ok { background: #22c55e; }
    .dot-err { background: #ef4444; }
    .dot-syncing { background: #f59e0b; }
    .alert { padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-top: 12px; }
    .alert-error { background: #fee2e2; color: #991b1b; }
    .alert-success { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('connection')">Connection</button>
  <button class="tab" onclick="showTab('sync')">Sync</button>
</div>

<div id="content">
  <!-- Connection tab -->
  <div id="tab-connection" class="panel active">
    <div class="field">
      <label>Server URL</label>
      <input id="server-url" type="url" placeholder="http://localhost:8080" />
    </div>
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>
    <div class="field">
      <label>Local sync root</label>
      <input id="root-path" type="text" placeholder="/home/user/Uncloud" />
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-primary" onclick="doLogin()">Connect</button>
      <button class="btn btn-danger" id="btn-disconnect" style="display:none" onclick="doDisconnect()">Disconnect</button>
    </div>
    <div id="conn-msg"></div>
  </div>

  <!-- Sync tab -->
  <div id="tab-sync" class="panel">
    <p style="font-size:14px;color:#666;">
      Sync runs automatically every 60 seconds once connected.
    </p>
    <button class="btn btn-primary" onclick="doSyncNow()">Sync Now</button>
    <div id="sync-msg"></div>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot dot-ok" id="status-dot"></span>
  <span id="status-text">Not configured</span>
</div>

<script>
  const { invoke } = window.__TAURI__.core;

  async function loadSavedConfig() {
    try {
      const cfg = await invoke('get_config');
      if (cfg) {
        document.getElementById('server-url').value = cfg.server_url;
        document.getElementById('username').value   = cfg.username;
        document.getElementById('root-path').value  = cfg.root_path;
        document.getElementById('btn-disconnect').style.display = 'inline-block';
      }
    } catch (_) {}
  }

  async function doDisconnect() {
    try {
      await invoke('disconnect');
      document.getElementById('btn-disconnect').style.display = 'none';
      document.getElementById('conn-msg').innerHTML =
        '<div class="alert alert-success">Disconnected.</div>';
      refreshStatus();
    } catch (e) {
      document.getElementById('conn-msg').innerHTML =
        `<div class="alert alert-error">${e}</div>`;
    }
  }

  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const panels = ['connection', 'sync'];
      t.classList.toggle('active', panels[i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('active', p.id === 'tab-' + name);
    });
  }

  async function doLogin() {
    const server = document.getElementById('server-url').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rootPath = document.getElementById('root-path').value.trim();
    const msg = document.getElementById('conn-msg');
    try {
      await invoke('login', { server, username, password, rootPath });
      msg.innerHTML = '<div class="alert alert-success">Connected successfully.</div>';
      document.getElementById('btn-disconnect').style.display = 'inline-block';
      refreshStatus();
    } catch (e) {
      msg.innerHTML = `<div class="alert alert-error">${e}</div>`;
    }
  }

  async function doSyncNow() {
    const msg = document.getElementById('sync-msg');
    try {
      const report = await invoke('sync_now');
      msg.innerHTML = `<div class="alert alert-success">
        Sync complete: ${report.uploaded.length} uploaded,
        ${report.downloaded.length} downloaded,
        ${report.deleted_local.length} deleted,
        ${report.conflict_count} conflicts.
      </div>`;
      refreshStatus();
    } catch (e) {
      msg.innerHTML = `<div class="alert alert-error">${e}</div>`;
    }
  }

  async function refreshStatus() {
    try {
      const status = await invoke('get_status');
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'status-dot';
      if (status.type === 'idle') {
        dot.classList.add('dot-ok');
        const d = new Date(status.last_sync);
        text.textContent = `Up to date · ${d.toLocaleTimeString()}`;
      } else if (status.type === 'syncing') {
        dot.classList.add('dot-syncing');
        text.textContent = 'Syncing…';
      } else if (status.type === 'error') {
        dot.classList.add('dot-err');
        text.textContent = `Error: ${status.message}`;
      } else {
        text.textContent = 'Not configured';
      }
    } catch (_) {}
  }

  loadSavedConfig();
  refreshStatus();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>
